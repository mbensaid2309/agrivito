name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  mobile:
    name: Mobile checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: |
          set +e
          flutter analyze > analyze.log 2>&1
          status=$?
          cat analyze.log
          if [ "$status" -ne 0 ]; then
            python3 - <<'PY'
          from pathlib import Path

          message = Path("analyze.log").read_text()
          message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=flutter analyze failed::{message}")
          PY
            exit "$status"
          fi

      - name: Test
        run: flutter test
